<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Felices 21</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
text-align:center;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

#login,#contenido{
width:100%;
max-width:420px;
}

h1{
font-size:26px;
margin-bottom:10px;
line-height:1.3;
}

p{
color:#cbd5f5;
line-height:1.5;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:6px;
margin-bottom:10px;
font-size:16px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:white;
cursor:pointer;
font-size:16px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.2s;
}

button:active{
transform:scale(0.97);
}

.card{

background:rgba(30,41,59,0.95);
padding:22px;
margin-top:18px;
border-radius:22px;

box-shadow:
0 10px 30px rgba(0,0,0,0.5);

transition:0.4s;
}

.locked{
opacity:0.55;
}

.unlocked{

background:linear-gradient(135deg,#22c55e,#16a34a);

transform:scale(1.03);

box-shadow:
0 15px 40px rgba(0,0,0,0.7);

animation:pop 0.6s;

}

@keyframes pop{
0%{transform:scale(0.8)}
70%{transform:scale(1.08)}
100%{transform:scale(1.03)}
}

.countdown{
font-size:18px;
margin-top:10px;
color:#38bdf8;
font-weight:600;
}

#contenido{

}

</style>

</head>

este mes (el mejor) te daré 3 regalos por bonita... ah y porque es tu cumple<br>
cada semana se desbloqueará una pista.

<div id="evento1" class="card locked">

</html>
